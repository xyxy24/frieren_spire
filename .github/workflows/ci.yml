name: Windows CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show tool versions
        shell: pwsh
        run: |
          cmake --version
          ctest --version

      - name: Configure Visual Studio 2022 x64
        run: cmake --preset windows-vs2022

      - name: Build Debug
        run: cmake --build --preset debug-vs2022 --parallel

      - name: Run Debug tests
        run: ctest --preset debug-vs2022
